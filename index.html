<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 英语音标大冒险 - Phonics Quest</title>
    <style>
        :root {
            --bg: #fdf6e3;
            --card-bg: #ffffff;
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --success: #51cf66;
            --danger: #ff8787;
            --text: #2d3436;
            --text-light: #636e72;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --radius: 20px;
            --radius-sm: 12px;
            --font-main: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-ipa: 'Segoe UI', 'Arial Unicode MS', 'Lucida Sans Unicode', 'DejaVu Sans', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #fdf6e3 0%, #fce4d6 25%, #e8f5e9 50%, #e3f2fd 75%, #fdf6e3 100%);
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes bgShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
        }

        /* 浮动装饰 */
        .floating-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .float-item {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.25;
            animation: floatAround 18s linear infinite;
        }
        .float-item:nth-child(1) {
            top: 8%;
            left: 10%;
            animation-delay: 0s;
            font-size: 2rem;
        }
        .float-item:nth-child(2) {
            top: 15%;
            right: 12%;
            animation-delay: -4s;
            font-size: 2.8rem;
        }
        .float-item:nth-child(3) {
            bottom: 20%;
            left: 8%;
            animation-delay: -8s;
            font-size: 2.2rem;
        }
        .float-item:nth-child(4) {
            bottom: 12%;
            right: 10%;
            animation-delay: -12s;
            font-size: 3rem;
        }
        .float-item:nth-child(5) {
            top: 45%;
            left: 5%;
            animation-delay: -6s;
            font-size: 1.8rem;
        }
        .float-item:nth-child(6) {
            top: 40%;
            right: 6%;
            animation-delay: -10s;
            font-size: 2.4rem;
        }
        @keyframes floatAround {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            25% {
                transform: translateY(-30px) rotate(8deg) scale(1.1);
            }
            50% {
                transform: translateY(-15px) rotate(-5deg) scale(0.95);
            }
            75% {
                transform: translateY(-40px) rotate(3deg) scale(1.05);
            }
            100% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
        }

        /* 主容器 */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow-lg);
            padding: 28px 24px 24px;
            transition: all var(--transition);
            overflow: hidden;
        }
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b);
            background-size: 200% 100%;
            animation: rainbowBar 3s linear infinite;
            border-radius: 28px 28px 0 0;
        }
        @keyframes rainbowBar {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header .title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header .title .icon {
            font-size: 2rem;
            animation: bounceIcon 1.5s ease infinite;
        }
        @keyframes bounceIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-12px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-6px);
            }
        }
        .stars-display {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fffbe6;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.95rem;
            color: #e67700;
            box-shadow: 0 2px 8px rgba(255, 152, 0, 0.15);
        }
        .stars-display .star-icon {
            font-size: 1.3rem;
            animation: twinkle 2s ease infinite;
        }
        .stars-display .star-icon:nth-child(2) {
            animation-delay: 0.5s;
        }
        .stars-display .star-icon:nth-child(3) {
            animation-delay: 1s;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.7);
            }
        }

        /* 得分和连击 */
        .score-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .combo-badge {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            animation: pulseCombo 0.6s ease infinite;
            display: none;
        }
        .combo-badge.active {
            display: inline-block;
        }
        @keyframes pulseCombo {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }
        .lives-display {
            display: flex;
            gap: 3px;
            font-size: 1.3rem;
        }
        .lives-display .heart {
            transition: all 0.3s;
        }
        .lives-display .heart.lost {
            opacity: 0.25;
            transform: scale(0.7);
            filter: grayscale(1);
        }

        /* 进度条 */
        .progress-wrap {
            margin-bottom: 20px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .progress-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44b8ab);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 游戏区域 */
        .game-area {
            text-align: center;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        /* 音标显示 */
        .phoneme-display {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border: 3px dashed #dee2e6;
            border-radius: var(--radius);
            padding: 22px 30px;
            font-family: var(--font-ipa);
            font-size: 3.5rem;
            font-weight: 700;
            color: #2d3436;
            letter-spacing: 2px;
            transition: all var(--transition);
            cursor: default;
            position: relative;
            min-width: 140px;
        }
        .phoneme-display .listen-btn {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ff6b6b;
            color: #fff;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .phoneme-display .listen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 18px rgba(255, 107, 107, 0.55);
        }
        .phoneme-display .listen-btn:active {
            transform: scale(0.9);
        }
        .phoneme-display .listen-btn.playing {
            animation: pulseListen 0.5s ease infinite;
            background: #ff3b3b;
        }
        @keyframes pulseListen {
            0%,
            100% {
                box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 107, 107, 0.9), 0 4px 12px rgba(255, 107, 107, 0.6);
            }
        }
        .phoneme-hint {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* 选项 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 420px;
        }
        @media (max-width: 420px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .phoneme-display {
                font-size: 2.8rem;
                padding: 16px 22px;
                min-width: 100px;
            }
            .app-container {
                padding: 20px 12px 16px;
                border-radius: 22px;
            }
            .header .title {
                font-size: 1.3rem;
            }
        }
        .option-card {
            background: #fff;
            border: 3px solid #e9ecef;
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            cursor: pointer;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text);
            transition: all var(--transition);
            text-align: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 55px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .option-card:hover {
            border-color: #b2bec3;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            background: #fafafa;
        }
        .option-card:active {
            transform: scale(0.95);
        }
        .option-card .mini-speak {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.2s;
            opacity: 0.6;
            flex-shrink: 0;
        }
        .option-card .mini-speak:hover {
            opacity: 1;
            background: #f0f0f0;
            transform: scale(1.2);
        }
        .option-card.correct {
            border-color: #51cf66 !important;
            background: #ebfbee !important;
            animation: correctPop 0.5s ease;
            box-shadow: 0 0 25px rgba(81, 207, 102, 0.4) !important;
        }
        .option-card.wrong {
            border-color: #ff6b6b !important;
            background: #fff5f5 !important;
            animation: shake 0.5s ease;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.35) !important;
        }
        .option-card.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        @keyframes correctPop {
            0% {
                transform: scale(1);
            }
            40% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
        }

        /* 反馈消息 */
        .feedback-msg {
            font-weight: 700;
            font-size: 1.1rem;
            min-height: 28px;
            transition: all 0.3s;
        }
        .feedback-msg.correct-msg {
            color: #2b8a3e;
        }
        .feedback-msg.wrong-msg {
            color: #c92a2a;
        }

        /* 按钮 */
        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            font-family: var(--font-main);
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44b8ab);
            color: #fff;
            box-shadow: 0 4px 14px rgba(78, 205, 196, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(78, 205, 196, 0.5);
        }
        .btn-secondary {
            background: #fff;
            color: #4ecdc4;
            border: 2px solid #4ecdc4;
        }
        .btn-secondary:hover {
            background: #e6faf8;
        }
        .btn-accent {
            background: linear-gradient(135deg, #ffd93d, #ffc107);
            color: #5c3d00;
            box-shadow: 0 4px 14px rgba(255, 193, 7, 0.35);
            font-size: 1.1rem;
            padding: 14px 36px;
        }
        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(255, 193, 7, 0.5);
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* 关卡选择 */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 10px;
            width: 100%;
        }
        .level-btn {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            border: 3px solid #e9ecef;
            background: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.4rem;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            position: relative;
        }
        .level-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        .level-btn.unlocked {
            border-color: #4ecdc4;
            background: #f0fdf9;
        }
        .level-btn.completed {
            border-color: #51cf66;
            background: #ebfbee;
        }
        .level-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f8f9fa;
        }
        .level-btn .level-stars {
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        .level-btn .lock-icon {
            font-size: 1.2rem;
            position: absolute;
            top: 6px;
            right: 8px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 28px 22px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .modal .big-emoji {
            font-size: 4rem;
            animation: bounceIcon 1s ease infinite;
        }
        .modal .star-result {
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin: 10px 0;
        }

        /* 音标参考表 */
        .phoneme-chart {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            padding: 8px;
            margin: 10px 0;
        }
        .phoneme-chip {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 6px 4px;
            cursor: pointer;
            font-family: var(--font-ipa);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
            color: #2d3436;
        }
        .phoneme-chip:hover {
            background: #e6faf8;
            border-color: #4ecdc4;
            transform: scale(1.05);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .gap-8 {
            gap: 8px;
        }
        .flex-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- 浮动装饰 -->
    <div class="floating-decorations">
        <span class="float-item">📚</span>
        <span class="float-item">🌟</span>
        <span class="float-item">🎵</span>
        <span class="float-item">🔤</span>
        <span class="float-item">💡</span>
        <span class="float-item">🎯</span>
    </div>

    <!-- 主应用容器 -->
    <div class="app-container" id="appContainer">
        <!-- 头部 -->
        <div class="header">
            <div class="title">
                <span class="icon">🎯</span> 音标大冒险
            </div>
            <div class="stars-display">
                <span class="star-icon">⭐</span>
                <span id="totalStars">0</span> 颗星
            </div>
        </div>

        <!-- 得分和状态 -->
        <div class="score-bar" id="scoreBar">
            <span>🏆 得分: <strong id="scoreDisplay">0</strong></span>
            <span class="combo-badge" id="comboBadge">🔥 连击 x1</span>
            <span style="margin-left:auto;">❤️ <span class="lives-display" id="livesDisplay"></span></span>
        </div>

        <!-- 进度条 -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-info">
                <span id="progressLabel">关卡进度</span>
                <span id="progressFraction">0/8</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area" id="gameArea">
            <!-- 动态填充 -->
        </div>

        <!-- 底部按钮区 -->
        <div class="text-center mt-16 flex-wrap gap-8" id="bottomActions">
            <button class="btn btn-secondary" id="btnPhonemeChart" title="查看音标表">📖 音标表</button>
            <button class="btn btn-secondary" id="btnBackToLevels">🏠 关卡选择</button>
        </div>
    </div>

    <!-- 弹窗容器 -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        (function() {
            // ==================== 音标数据库 ====================
            // 每个音标包含：符号、示例单词（用于TTS朗读）、干扰单词
            const phonemeData = {
                // 短元音
                'ɪ': { symbol: '/ɪ/', word: 'fish', altWords: ['ship', 'big', 'sit'], category: '短元音',
                    color: '#ff7675' },
                'e': { symbol: '/e/', word: 'bed', altWords: ['pen', 'red', 'get'], category: '短元音', color: '#fab1a0' },
                'æ': { symbol: '/æ/', word: 'cat', altWords: ['hat', 'map', 'bag'], category: '短元音', color: '#fdcb6e' },
                'ʌ': { symbol: '/ʌ/', word: 'cup', altWords: ['sun', 'run', 'bus'], category: '短元音', color: '#ffeaa7' },
                'ɒ': { symbol: '/ɒ/', word: 'dog', altWords: ['hot', 'box', 'top'], category: '短元音', color: '#dfe6e9' },
                'ʊ': { symbol: '/ʊ/', word: 'book', altWords: ['foot', 'good', 'put'], category: '短元音',
                color: '#b2bec3' },
                'ə': { symbol: '/ə/', word: 'about', altWords: ['banana', 'doctor', 'sofa'], category: '短元音',
                    color: '#81ecec' },
                // 长元音
                'iː': { symbol: '/iː/', word: 'sheep', altWords: ['tree', 'bee', 'sea'], category: '长元音',
                    color: '#74b9ff' },
                'ɑː': { symbol: '/ɑː/', word: 'car', altWords: ['star', 'far', 'park'], category: '长元音',
                color: '#a29bfe' },
                'ɔː': { symbol: '/ɔː/', word: 'door', altWords: ['horse', 'four', 'ball'], category: '长元音',
                    color: '#6c5ce7' },
                'uː': { symbol: '/uː/', word: 'moon', altWords: ['food', 'blue', 'zoo'], category: '长元音',
                color: '#0984e3' },
                'ɜː': { symbol: '/ɜː/', word: 'bird', altWords: ['nurse', 'girl', 'work'], category: '长元音',
                    color: '#636e72' },

            // 所有音标键列表

            // ==================== 游戏状态 ====================
            const state = {

            // ==================== 工具函数 ====================
            function shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function getDistractorKeys(correctKey, count, poolKeys) {
                // 从池中选择不包含正确音标的干扰项
                const available = poolKeys.filter(k => k !== correctKey && !state.questions.some(q => q
                    .distractorKeys?.includes(k) && q.phonemeKey === correctKey));
                const shuffled = shuffle(available);
                // 优先选择同类别的干扰项
                const sameCategory = shuffled.filter(k => phonemeData[k].category === phonemeData[correctKey]
                    .category);
                const others = shuffled.filter(k => phonemeData[k].category !== phonemeData[correctKey].category);
                let selected = [...sameCategory.slice(0, Math.ceil(count * 0.6)), ...others.slice(0, count)];
                selected = selected.slice(0, count);
                while (selected.length < count) {
                    const extra = shuffled.find(k => !selected.includes(k));
                    if (!extra) break;
                    selected.push(extra);
                }
                return shuffle(selected).slice(0, count);
            }

            function generateQuestions(levelDef) {
                const questions = [];
                const keysToUse = shuffle([...levelDef.keys]);
                const numQuestions = levelDef.questionsPerRound;
                const selectedKeys = keysToUse.slice(0, Math.min(numQuestions, keysToUse.length));

                // 如果音标不够，循环填充
                while (selectedKeys.length < numQuestions) {
                    selectedKeys.push(keysToUse[selectedKeys.length % keysToUse.length]);
                }

                for (const key of selectedKeys) {
                    const data = phonemeData[key];
                    const correctWord = data.altWords[Math.floor(Math.random() * data.altWords.length)] || data.word;
                    const distractorKeys = getDistractorKeys(key, 3, allPhonemeKeys);
                    const distractorWords = distractorKeys.map(dk => {
                        const dd = phonemeData[dk];
                        return dd.altWords[Math.floor(Math.random() * dd.altWords.length)] || dd.word;
                    });
                    const allOptions = shuffle([
                        { word: correctWord, isCorrect: true, phonemeKey: key },
                        ...distractorWords.map((w, i) => ({ word: w, isCorrect: false, phonemeKey: distractorKeys[
                                i] })),
                    ]);
                    questions.push({
                        phonemeKey: key,
                        symbol: data.symbol,
                        correctWord: correctWord,
                        options: allOptions,
                        category: data.category,
                    });
                }
                return shuffle(questions);
            }

            // ==================== 发音系统 (Web Speech API) ====================
            let speechSynth = window.speechSynthesis;
            let isSpeaking = false;

            function getBestVoice() {
                if (!speechSynth) return null;
                const voices = speechSynth.getVoices();
                // 优先选择英式或美式英语
                const preferred = voices.find(v => v.lang === 'en-GB' && v.name.includes('British')) ||
                    voices.find(v => v.lang === 'en-US' && v.name.includes('Samantha')) ||
                    voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) ||
                    voices.find(v => v.lang === 'en-GB') ||
                    voices.find(v => v.lang === 'en-US') ||
                    voices.find(v => v.lang.startsWith('en'));
                return preferred || voices[0] || null;
            }

            function speakWord(word, callback) {
                if (!speechSynth) {
                    console.warn('Speech Synthesis not supported');
                    if (callback) callback();
                    return;
                }
                // 取消正在进行的语音
                speechSynth.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                const voice = getBestVoice();
                if (voice) utterance.voice = voice;
                utterance.lang = voice?.lang || 'en-US';
                utterance.rate = 0.75; // 稍慢，适合孩子
                utterance.pitch = 1.1;
                utterance.volume = 0.9;
                isSpeaking = true;
                utterance.onend = () => {
                    isSpeaking = false;
                    if (callback) callback();
                };
                utterance.onerror = () => {
                    isSpeaking = false;
                    if (callback) callback();
                };
                speechSynth.speak(utterance);
            }

            function speakPhonemeExample(phonemeKey, callback) {
                const data = phonemeData[phonemeKey];
                if (!data) {
                    if (callback) callback();
                    return;
                }
                speakWord(data.word, callback);
            }

            // ==================== 音效 (Web Audio API) ====================
            let audioCtx = null;

            function getAudioCtx() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                return audioCtx;
            }

            function playBeep(frequency, duration, type = 'sine') {
                try {
                    const ctx = getAudioCtx();
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    oscillator.type = type;
                    oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
                    gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + duration);
                } catch (e) {
                    // 静默处理
                }
            }

                    <div class="level-grid">

            function startLevel(levelDef) {
                state.currentView = 'game';

            // ==================== 视图：题目 ====================
            function renderQuestion() {
                if (state.currentQuestionIndex >= state.questions.length) {
                    finishLevel();
                    return;
                }
                state.isAnswerLocked = false;
                const question = state.questions[state.currentQuestionIndex];
                const total = state.questions.length;
                const current = state.currentQuestionIndex;

                updateProgress(current, total);
                updateTopBar();

                gameArea.innerHTML = `
                    <div style="font-size:0.85rem;color:#636e72;">第 ${current + 1} / ${total} 题 · ${question.category}</div>
                    <div class="phoneme-display" id="phonemeDisplay">
                        ${question.symbol}

                    </div>

                    <div class="feedback-msg" id="feedbackMsg"></div>
                    <div class="options-grid" id="optionsGrid">
                        ${question.options.map((opt, i) => `
                            <div class="option-card" data-index="${i}" data-correct="${opt.isCorrect}">
                                <span>${opt.word}</span>
                                <button class="mini-speak" data-word="${opt.word}" title="听这个单词">🔈</button>
                            </div>
                        `).join('')}
                    </div>
                `;

                // 绑定主发音按钮
                const btnListenMain = document.getElementById('btnListenMain');
                if (btnListenMain) {
                    btnListenMain.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (isSpeaking) {
                            speechSynth?.cancel();
                            isSpeaking = false;
                            btnListenMain.classList.remove('playing');
                            return;
                        }
                        btnListenMain.classList.add('playing');
                        speakPhonemeExample(question.phonemeKey, () => {
                            btnListenMain.classList.remove('playing');
                        });
                    });
                }

                // 绑定选项点击
                const optionsGrid = document.getElementById('optionsGrid');
                if (optionsGrid) {
                    optionsGrid.querySelectorAll('.option-card').forEach(card => {
                        card.addEventListener('click', function(e) {
                            if (state.isAnswerLocked) return;
                            if (e.target.classList.contains('mini-speak')) return;
                            handleAnswer(card, question);
                        });
                    });
                    // 绑定小喇叭
                    optionsGrid.querySelectorAll('.mini-speak').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const word = this.dataset.word;
                            if (word) {
                                playClickSound();
                                speakWord(word);
                            }
                        });
                    });
                }

                // 自动朗读一次
                setTimeout(() => {
                    if (btnListenMain && !state.isAnswerLocked) {
                        btnListenMain.classList.add('playing');
                        speakPhonemeExample(question.phonemeKey, () => {
                            if (btnListenMain) btnListenMain.classList.remove('playing');
                        });
                    }
                }, 400);

            function handleAnswer(card, question) {
                if (state.isAnswerLocked) return;
                state.isAnswerLocked = true;

                const isCorrect = card.dataset.correct === 'true';
                const feedbackMsg = document.getElementById('feedbackMsg');
                const allCards = document.querySelectorAll('.option-card');

                // 禁用所有选项
                allCards.forEach(c => c.classList.add('disabled'));

                if (isCorrect) {
                    card.classList.add('correct');
                    state.combo++;
                    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
                    const comboBonus = Math.min(state.combo - 1, 5) * 10;
                    const baseScore = 50;
                    const earnedScore = baseScore + comboBonus;
                    state.score += earnedScore;
                    feedbackMsg.textContent = `✅ 太棒了！+${earnedScore}分${state.combo >= 3 ? ' (连击奖励!)' : ''}`;
                    feedbackMsg.className = 'feedback-msg correct-msg';
                    playCorrectSound();
                } else {
                    card.classList.add('wrong');
                    // 高亮正确答案
                    allCards.forEach(c => {
                        if (c.dataset.correct === 'true') c.classList.add('correct');
                    });
                    state.combo = 0;
                    state.lives--;
                    feedbackMsg.textContent = `❌ 不对哦～正确答案已标出。生命 -1`;
                    feedbackMsg.className = 'feedback-msg wrong-msg';
                    playWrongSound();
                }

                updateTopBar();

                // 检查生命值
                if (state.lives <= 0) {
                    setTimeout(() => {
                        gameOver();
                    }, 1500);
                    return;
                }

                // 下一题
                setTimeout(() => {
                    state.currentQuestionIndex++;
                    if (state.currentQuestionIndex >= state.questions.length) {
                        finishLevel();
                    } else {
                        renderQuestion();
                    }
                }, 1400);
            }

            // ==================== 关卡结束 ====================
            function finishLevel() {
                state.isAnswerLocked = true;
                const levelDef = levelDefinitions.find(l => l.id === state.currentLevelId);
                if (!levelDef) return;

                const totalQuestions = state.questions.length;
                const correctAnswers = Math.round(state.score / 50); // 估算正确数
                const actualCorrect = totalQuestions - (3 - Math.max(state.lives, 0));
                const passPercent = levelDef.passPercent;
                const passThreshold = Math.ceil(totalQuestions * passPercent);
                const estimatedCorrect = Math.max(0, Math.min(totalQuestions, actualCorrect));
                const passed = estimatedCorrect >= passThreshold && state.lives > 0;

                let stars = 0;
                if (passed) {
                    const ratio = estimatedCorrect / totalQuestions;
                    if (ratio >= 0.95) stars = 3;
                    else if (ratio >= 0.8) stars = 2;
                    else stars = 1;
                }

                // 保存进度
                const prevProgress = state.levelProgress[levelDef.id] || {};
                if (passed) {
                    state.levelProgress[levelDef.id] = {
                        completed: true,
                        stars: Math.max(prevProgress.stars || 0, stars),
                        bestScore: Math.max(prevProgress.bestScore || 0, state.score),
                    };
                }
                state.totalStars = Object.values(state.levelProgress).reduce((sum, p) => sum + (p.stars || 0), 0);
                updateTopBar();
                saveProgress();

                if (passed) {
                    playLevelCompleteSound();
                }

                progressFill.style.width = '100%';
                progressFraction.textContent = `${totalQuestions}/${totalQuestions}`;

                const starEmoji = ['', '⭐', '🌟🌟', '🌟🌟🌟'][stars];
                const passedMsg = passed ?
                    `
                    <div class="big-emoji">🎉</div>
                    <h2>恭喜过关！</h2>
                    <div class="star-result">${starEmoji}</div>
                    <p>得分: <strong>${state.score}</strong> | 最大连击: <strong>${state.maxCombo}</strong></p>
                    <p style="color:#636e72;">正确约 ${estimatedCorrect}/${totalQuestions} 题</p>
                ` :
                    `
                    <div class="big-emoji">😢</div>
                    <h2>还需努力</h2>
                    <p>生命值耗尽了！正确约 ${estimatedCorrect}/${totalQuestions} 题</p>
                    <p style="color:#636e72;">需要答对至少 ${passThreshold} 题才能过关</p>
                `;

                gameArea.innerHTML = `
                    <div style="text-align:center;">
                        ${passedMsg}
                        <div class="flex-wrap gap-8 mt-16">
                            <button class="btn btn-accent" id="btnRetry">🔄 ${passed ? '再玩一次' : '重新挑战'}</button>
                            <button class="btn btn-primary" id="btnNextLevel">${passed && levelDef.id < levelDefinitions.length ? '▶️ 下一关' : '🏠 关卡选择'}</button>
                        </div>
                    </div>
                `;

                document.getElementById('btnRetry').addEventListener('click', () => {
                    playClickSound();
                    startLevel(levelDef);
                });
                document.getElementById('btnNextLevel').addEventListener('click', () => {
                    playClickSound();
                    if (passed && levelDef.id < levelDefinitions.length) {
                        const nextLevel = levelDefinitions.find(l => l.id === levelDef.id + 1);
                        if (nextLevel) startLevel(nextLevel);
                        else renderLevelSelect();
                    } else {
                        renderLevelSelect();
                    }
                });
            }

            function gameOver() {
                state.isAnswerLocked = true;
                const levelDef = levelDefinitions.find(l => l.id === state.currentLevelId);
                const totalQuestions = state.questions.length;
                const estimatedCorrect = totalQuestions - (3 - Math.max(state.lives, 0));

                playWrongSound();
                gameArea.innerHTML = `
                    <div style="text-align:center;">
                        <div class="big-emoji">💔</div>
                        <h2>生命耗尽</h2>
                        <p>正确约 ${Math.max(0, estimatedCorrect)}/${totalQuestions} 题</p>
                        <p style="color:#636e72;">得分: ${state.score}</p>
                        <div class="flex-wrap gap-8 mt-16">
                            <button class="btn btn-accent" id="btnRetryGameOver">🔄 重新挑战</button>
                            <button class="btn btn-secondary" id="btnBackGameOver">🏠 返回关卡</button>
                        </div>
                    </div>
                `;
                document.getElementById('btnRetryGameOver').addEventListener('click', () => {
                    playClickSound();
                    if (levelDef) startLevel(levelDef);
                    else renderLevelSelect();
                });
                document.getElementById('btnBackGameOver').addEventListener('click', () => {
                    playClickSound();
                    renderLevelSelect();
                });
                updateTopBar();
                updateProgress(totalQuestions, totalQuestions);
            }

            // ==================== 音标参考表弹窗 ====================
            function showPhonemeChart() {
                playClickSound();
                const categories = {};
                for (const key of allPhonemeKeys) {
                    const cat = phonemeData[key].category;
                    if (!categories[cat]) categories[cat] = [];
                    categories[cat].push(key);
                }

                let chartHTML = '';
                for (const [cat, keys] of Object.entries(categories)) {
                    chartHTML += `
                        <div style="margin-bottom:8px;">
                            <strong style="font-size:0.8rem;color:#636e72;">${cat}</strong>
                            <div class="phoneme-chart" style="max-height:unset;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));">
                                ${keys.map(k => `
                                    <div class="phoneme-chip" data-phoneme="${k}" title="${phonemeData[k].word}">
                                        ${phonemeData[k].symbol}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                showModal(`
                    <h3>📖 音标参考表</h3>
                    <p style="font-size:0.8rem;color:#636e72;">点击音标听示例发音</p>
                    <div style="max-height:55vh;overflow-y:auto;padding:4px;">
                        ${chartHTML}
                    </div>
                    <button class="btn btn-primary mt-12" id="btnCloseChart">关闭</button>
                `);

                // 绑定音标点击
                setTimeout(() => {
                    const chips = modalContent.querySelectorAll('.phoneme-chip');
                    chips.forEach(chip => {
                        chip.addEventListener('click', function() {
                            const key = this.dataset.phoneme;
                            if (key && phonemeData[key]) {
                                playClickSound();
                                this.style.background = '#ffeaa7';
                                this.style.borderColor = '#fdcb6e';
                                speakPhonemeExample(key, () => {
                                    this.style.background = '';
                                    this.style.borderColor = '';
                                });
                            }
                        });
                    });
                    const btnClose = document.getElementById('btnCloseChart');
                    if (btnClose) btnClose.addEventListener('click', hideModal);
                }, 100);
            }

            // ==================== 进度持久化 ====================
            function saveProgress() {
                try {
                    const data = {
                        levelProgress: state.levelProgress,
                        totalStars: state.totalStars,
                    };
                    localStorage.setItem('phonics_quest_progress', JSON.stringify(data));
                } catch (e) {
                    // localStorage不可用
                }
            }

            function loadProgress() {
                try {
                    const raw = localStorage.getItem('phonics_quest_progress');
                    if (raw) {
                        const data = JSON.parse(raw);
                        state.levelProgress = data.levelProgress || {};
                        state.totalStars = data.totalStars || 0;
                    }
                } catch (e) {
                    // 忽略
                }
            }

            function resetProgress() {
                state.levelProgress = {};
                state.totalStars = 0;
                saveProgress();
                renderLevelSelect();
                updateTopBar();
                playClickSound();
            }

            // ==================== 按钮事件 ====================
            btnPhonemeChart.addEventListener('click', showPhonemeChart);
            btnBackToLevels.addEventListener('click', function() {
                playClickSound();
                speechSynth?.cancel();
                isSpeaking = false;
                renderLevelSelect();
            });

            // 添加重置按钮（长按标题）
            let titleClickCount = 0;
            let titleClickTimer = null;
            document.querySelector('.header .title').addEventListener('click', function() {
                titleClickCount++;
                if (titleClickCount >= 5) {
                    titleClickCount = 0;
                    if (confirm('确定要重置所有游戏进度吗？此操作不可撤销！')) {
                        resetProgress();
                    }
                }
                if (titleClickTimer) clearTimeout(titleClickTimer);
                titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 1500);
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if (state.currentView === 'game' && !state.isAnswerLocked) {
                    const keys = ['1', '2', '3', '4'];
                    const idx = keys.indexOf(e.key);
                    if (idx >= 0) {
                        const cards = document.querySelectorAll('.option-card');
                        if (cards[idx]) {
                            cards[idx].click();
                        }
                    }
                }
                if (e.key === 'Escape') {
                    hideModal();
                }
            });

            // ==================== 初始化 ====================
            function init() {
                loadProgress();
                updateTopBar();
                renderLevelSelect();
                // 预加载语音
                if (speechSynth) {
                    speechSynth.getVoices();
                    speechSynth.onvoiceschanged = () => { speechSynth.getVoices(); };
                }
            }

            // 处理语音列表加载
            if (speechSynth) {
                speechSynth.getVoices();
                speechSynth.onvoiceschanged = () => { speechSynth.getVoices(); };
            }

            init();

            console.log('🎯 英语音标大冒险已就绪！');
            console.log('📖 点击音标表查看所有48个音标');
            console.log('🔊 点击喇叭听发音');
            console.log('⌨️ 键盘快捷键：按1-4选择答案');
            console.log('💡 提示：连续点击标题5次可重置进度');
            console.log('🚀 部署到GitHub Pages：直接将此HTML文件上传即可');
        })();
    </script>
</body>
</html>
